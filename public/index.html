<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>BOBO test</title></head>
<body>
<h1>BOBO chat test</h1>
<input id="msg" placeholder="Escribe algo..." style="width:300px;padding:8px">
<button onclick="send()">Enviar</button>
<div id="out" style="margin-top:20px;font-size:16px"></div>
<script>
async function send() {
  const msg = document.getElementById('msg').value;
  document.getElementById('out').textContent = 'Escribiendo...';
  const r = await fetch('/api/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ message: msg })
  });
  const d = await r.json();
  document.getElementById('out').textContent = d.reply;
}
</script>
</body>
</html>
